services:
  - type: web
    name: se-card-game
    runtime: python
    plan: starter
    buildCommand: npm install -g @salesforce/cli && pip install -r requirements.txt
    startCommand: echo $SFDX_AUTH_URL | sf org login sfdx-url --sfdx-url-stdin --set-default && gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 30
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SFDX_AUTH_URL
        sync: false
      - key: SESSION_DIR
        value: /data
    disk:
      name: session-state
      mountPath: /data
      sizeGB: 1
